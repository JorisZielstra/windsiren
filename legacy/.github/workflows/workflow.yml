name: Testing and building workflow

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [master]
    types: [opened, synchronize]

jobs:
  Code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Install Pylint
        run: |
          python -m pip install --upgrade pip
          python -m pip install pylint==2.12.2
      - name: Lint cloud functions
        run: |
          python -m pylint --rcfile=.pylintrc --disable=import-error,duplicate-code $(git ls-files 'cloud_functions/*.py')
      - name: Install Windsiren package
        run: |
          python -m pip install .
      - name: Lint package
        run: |
          python -m pylint --rcfile=.pylintrc --ignore-paths=cloud_functions/* $(git ls-files '*.py')

  Notification-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Query weather and notify
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_COMPOSE_CREDENTIALS: ${{ secrets.GMAIL_COMPOSE_CREDENTIALS }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
        run: |
          python windsiren/scripts/query_and_notify.py --recipient ${{ secrets.GMAIL_USERNAME }}
